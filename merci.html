<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci ! — MassPub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --red: #FF3E41;
        --dark: #0D0D0D;
        --white: #F5F1EB;
    }

    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--dark);
        color: var(--white);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
        overflow: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 60% 60% at 50% 40%, rgba(255,62,65,0.1), transparent 70%);
        pointer-events: none;
    }

    body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 60px 60px;
        mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
        pointer-events: none;
    }

    .card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 24px;
        padding: 56px 48px;
        max-width: 560px;
        width: 100%;
        text-align: center;
        position: relative;
        overflow: hidden;
        animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--red), #FFC107);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .success-ring {
        width: 88px; height: 88px;
        background: rgba(255,62,65,0.1);
        border: 2px solid rgba(255,62,65,0.3);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 28px;
        font-size: 2.2rem;
        animation: pop 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both;
        position: relative;
    }

    .success-ring::after {
        content: '';
        position: absolute;
        inset: -10px;
        border: 1px solid rgba(255,62,65,0.15);
        border-radius: 50%;
        animation: ring-pulse 2s ease-out 1s infinite;
    }

    @keyframes pop {
        from { transform: scale(0.5); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
    }

    @keyframes ring-pulse {
        0%   { transform: scale(1); opacity: 0.6; }
        100% { transform: scale(1.4); opacity: 0; }
    }

    h1 {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 2.2rem;
        color: var(--white);
        margin-bottom: 14px;
        letter-spacing: -0.5px;
        animation: fadeUp 0.6s ease 0.5s both;
    }

    .subtitle {
        font-size: 1rem;
        color: rgba(255,255,255,0.45);
        line-height: 1.7;
        margin-bottom: 36px;
        font-weight: 300;
        animation: fadeUp 0.6s ease 0.65s both;
    }

    .info-box {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        padding: 24px;
        margin-bottom: 28px;
        animation: fadeUp 0.6s ease 0.8s both;
    }

    .info-box h5 {
        font-family: 'Syne', sans-serif;
        font-size: 0.72rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin-bottom: 16px;
    }

    .info-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        text-align: left;
    }

    .info-row:last-child { border-bottom: none; }

    .info-icon {
        width: 36px; height: 36px;
        background: rgba(255,62,65,0.1);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--red);
        font-size: 0.85rem;
        flex-shrink: 0;
    }

    .info-label { font-size: 0.78rem; color: rgba(255,255,255,0.3); }
    .info-value { font-size: 0.92rem; color: rgba(255,255,255,0.75); font-weight: 500; }

    .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--red);
        color: white;
        padding: 14px 32px;
        border-radius: 8px;
        font-family: 'Syne', sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        animation: fadeUp 0.6s ease 0.95s both;
    }

    .btn-home:hover {
        background: #CC2E30;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 10px 28px rgba(255,62,65,0.35);
    }

    .brand {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.1rem;
        letter-spacing: 2px;
        color: rgba(255,255,255,0.2);
        margin-top: 36px;
        animation: fadeUp 0.6s ease 1.1s both;
    }

    .brand span { color: var(--red); }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
        .card { padding: 36px 24px; }
        h1 { font-size: 1.7rem; }
    }
    </style>
</head>
<body>
    <div class="card">
        <div class="success-ring">✓</div>

        <h1>Message envoyé !</h1>
        <p class="subtitle">
            Merci pour votre demande d'audit gratuit.<br>
            Un de nos experts vous contactera dans les <strong style="color:rgba(255,255,255,0.7)">24 heures ouvrables</strong>.
        </p>

        <div class="info-box">
            <h5>En attendant, contactez-nous directement</h5>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-phone"></i></div>
                <div>
                    <div class="info-label">Téléphone</div>
                    <div class="info-value">01 23 45 67 89</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-envelope"></i></div>
                <div>
                    <div class="info-label">Email</div>
                    <div class="info-value">contact@masspub.fr</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fab fa-whatsapp"></i></div>
                <div>
                    <div class="info-label">WhatsApp</div>
                    <div class="info-value">+225 07 89 58 27 28</div>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-home">
            <i class="fas fa-arrow-left fa-sm"></i> Retour à l'accueil
        </a>

        <div class="brand"><span>MASS</span>PUB</div>
    </div>
</body>
</html>
